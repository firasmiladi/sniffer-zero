# Lab-only mosquitto config.
# - Listener on 1883 (MQTT) and 9001 (websockets)
# - Anonymous allowed because the broker is bound to 127.0.0.1 only.
# - For deployable Pi, switch to password_file + TLS.

listener 1883
allow_anonymous true

listener 9001
protocol websockets

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
